<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ClawSweeper bot1 GitHub App Setup</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        padding: 32px 18px;
        background: #f6f8fa;
        color: #24292f;
      }
      main {
        max-width: 680px;
        margin: 0 auto;
        background: #fff;
        border: 1px solid #d0d7de;
        border-radius: 8px;
        padding: 24px;
      }
      h1 {
        font-size: 24px;
        line-height: 1.2;
        margin: 0 0 16px;
      }
      p {
        line-height: 1.5;
      }
      button {
        width: 100%;
        min-height: 48px;
        border: 0;
        border-radius: 6px;
        background: #1f883d;
        color: #fff;
        font-size: 16px;
        font-weight: 600;
      }
      code {
        display: block;
        overflow-wrap: anywhere;
        background: #f6f8fa;
        border: 1px solid #d0d7de;
        border-radius: 6px;
        padding: 10px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>ClawSweeper bot1 GitHub App Setup</h1>
      <p>Tap the button below. GitHub should open the new app manifest screen.</p>
      <form action="https://github.com/settings/apps/new?state=45e969f71b10d8ea4e0459ec" method="post">
        <input
          type="hidden"
          name="manifest"
          value='{"name":"clawsweeper-bot1-moqf7109","url":"https://github.com/balloonlee26/clawsweeper-bot1","hook_attributes":{"active":false},"redirect_url":"https://github.com/balloonlee26/clawsweeper-bot1","public":false,"default_permissions":{"actions":"read","contents":"write","issues":"read","pull_requests":"read"},"default_events":[]}'
        >
        <button type="submit">Create GitHub App</button>
      </form>
      <p>After GitHub redirects you, send back the <code>code=</code> value. The expected state is:</p>
      <code>45e969f71b10d8ea4e0459ec</code>
    </main>
  </body>
</html>
